name: "SemVer Tag Manager"
description: "A robust JavaScript-based GitHub Action to automate the creation and management of tags and releases using Semantic Versioning (SemVer) standards."
inputs:
  prefix:
    description: "Prefix for version tags (e.g. 'v', 'release-', or leave empty for no prefix)"
    required: false
    default: "v"
  token:
    description: "GitHub token or PAT used to create tags and releases"
    required: false
    default: ${{ github.token }}
  start-version:
    description: "Starting major version number when no tags exist yet (0 or 1)"
    required: false
    default: "0"
  dry-run:
    description: "When true, calculates and logs the next version but does not create a tag or release"
    required: false
    default: "false"
  make-latest:
    description: "When true, the release is marked as the latest release on GitHub"
    required: false
    default: "true"
  update-major:
    description: "When true, the major version tag (e.g. v1) is created or force-updated to point to the same commit as the new release"
    required: false
    default: "true"
  assets:
    description: "Newline-separated list of file paths or glob patterns to upload as release assets (e.g. dist/*.zip)"
    required: false
    default: ""
outputs:
  new-tag:
    description: "The newly created semver tag (e.g. v1.2.3)"
  major-tag:
    description: "The upserted major version tag (e.g. v1), or empty if update-major is false"
  release-url:
    description: "The URL of the newly created GitHub release"
  assets-uploaded:
    description: "Comma-separated list of asset filenames that were uploaded to the release"
runs:
  using: "node24"
  main: "dist/index.js"
