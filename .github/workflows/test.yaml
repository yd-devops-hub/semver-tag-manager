name: Test SemVer Tag Manager Action

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        id: checkout
        uses: actions/checkout@v6
      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install Dependencies
        id: install-dependencies
        run: npm install
      - name: Build Action
        id: build-action
        run: npx ncc build src/index.js -o dist
      - name: Commit Built Dist
        id: commit-dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git diff --cached --quiet || git commit -m "chore: update dist build [skip ci]"
          # git push
      - name: Run SemVer Tag Manager Action
        id: semver-tag-manager
        uses: ./
        with:
          dry-run: false
